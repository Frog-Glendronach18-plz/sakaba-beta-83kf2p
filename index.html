<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>酒場ドラフト戦記 verベータ1.02</title>
<meta name="description" content="仲間を雇って配置し、俯瞰マップの自動戦闘を勝ち抜くオートバトラー『酒場ドラフト戦記』">
<meta name="theme-color" content="#241710">

<!-- ═══ SNSシェア用（OGP / Twitter Card）═══
     ⚠️ og:url と og:image は「絶対URL」でないとX等のクローラーが読めないため、
     相対パスにせず公開URL（https://frog-glendronach18-plz.github.io/sakaba-beta-83kf2p/）を直書きする。
     公開先を引っ越したら下の og:url / og:image / twitter:image の3つを書き換えること。
     画像を差し替えたらX Card Validator等でキャッシュを更新すると反映が早い。 -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="酒場ドラフト戦記">
<meta property="og:title" content="酒場ドラフト戦記 — 仲間を雇い、配置し、あとは見守るだけ。">
<meta property="og:description" content="ブラウザだけで遊べる俯瞰マップの自動戦闘オートバトラー。10ラウンドで魔王を討て。無料・インストール不要・スマホ対応。">
<meta property="og:locale" content="ja_JP">
<meta property="og:url" content="https://frog-glendronach18-plz.github.io/sakaba-beta-83kf2p/">
<meta property="og:image" content="https://frog-glendronach18-plz.github.io/sakaba-beta-83kf2p/img/ogp.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="酒場ドラフト戦記のタイトルと盤面イメージ">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="酒場ドラフト戦記 — 仲間を雇い、配置し、あとは見守るだけ。">
<meta name="twitter:description" content="ブラウザだけで遊べる俯瞰マップの自動戦闘オートバトラー。10ラウンドで魔王を討て。無料・インストール不要・スマホ対応。">
<meta name="twitter:image" content="https://frog-glendronach18-plz.github.io/sakaba-beta-83kf2p/img/ogp.png">

<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="酒場戦記">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="round-badge"><small>ラウンド</small><span id="roundNum">1</span><span id="roundMax">/10</span></div>
    <div id="hearts"></div>
    <div id="vault">
      <span id="goldNum">0</span>
      <span id="pips"></span>
      <span id="interestLabel">+0<small>利子</small></span>
    </div>
    <button id="wgBtn" title="戦況ゲージ表示切替">📊</button>
    <button id="evChip" style="display:none"></button>
    <button id="recBtn">🏆</button>
    <button id="helpBtn">❓</button>
    <button id="muteBtn">🔊</button>
  </div>

  <div id="boardWrap">
    <div id="boardLabel"><span id="enemyLabel">敵陣 — 次の対戦相手</span><span id="teamCount">自陣（下4行に配置）</span></div>
    <div id="warGauge"><div id="wgFill"></div><span id="wgAllyPct"></span><span id="wgFoePct"></span></div>
    <div id="rumorLine"></div>
    <div id="board">
      <svg id="predictLayer" viewBox="0 0 7 9" preserveAspectRatio="none"></svg>
      <svg id="predictHeads" viewBox="0 0 7 9" preserveAspectRatio="none"></svg>
      <div id="zoneHint"></div>
    </div>
  </div>

  <div id="infoBar"></div>
  <div id="synergy"></div>

  <div id="shopArea">
    <div id="shopTitle"><span id="shopName">🍺 酒場の募兵</span><span id="incomeNote"></span></div>
    <div id="tierOdds"></div>
    <div id="shopCards"></div>
    <div id="battleLog"></div>
    <div id="shopBtns">
      <button class="btn" id="rerollBtn">🎲 1G</button>
      <button class="btn" id="lockModeBtn" title="取り置き">🔒</button>
      <button class="btn" id="capBtn">👥 +1枠</button>
      <button class="btn" id="sellBtn">💰 売却</button>
      <button class="btn" id="fightBtn">⚔️ 戦闘開始</button>
    </div>
  </div>
  <div id="tutBox"></div>
</div>

<div id="fx"></div>
<div id="slam"><div id="slamText"></div></div>
<div id="overlay"><div id="panel"></div></div>
<div id="biomeBanner"></div>
<div id="toast"></div>

<!-- 読み込み順は依存関係どおり。最後の ui.js がイベント登録とゲーム起動を行う -->
<script src="./js/data.js"></script>
<script src="./js/audio.js"></script>
<script src="./js/bgm.js"></script>
<script src="./js/state.js"></script>
<script src="./js/shop.js"></script>
<script src="./js/enemies.js"></script>
<script src="./js/field.js"></script>
<script src="./js/team.js"></script>
<script src="./js/battle.js"></script>
<script src="./js/rounds.js"></script>
<script src="./js/render.js"></script>
<script src="./js/fx.js"></script>
<script src="./js/pwa.js"></script>
<script src="./js/resume.js"></script>
<script src="./js/arena.js"></script>
<script src="./js/stats.js"></script>
<script src="./js/ui.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
